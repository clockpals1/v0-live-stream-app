name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare
    timeout-minutes: 20

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'   # wrangler 4.x requires >=20.19
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ─── TypeScript gate ────────────────────────────────────────────
      # Fast check before any build work. Catches type errors introduced
      # in the AI Hub modules (lib/ai/*, components/admin/ai/*, etc.).
      - name: TypeScript check
        run: npx tsc --noEmit

      # ─── Smoke tests ────────────────────────────────────────────────
      # Boot a regular Next prod server and hit the public surface with
      # Playwright. If anything 500s, the deploy is blocked. This catches
      # the class of routing/runtime failures that the build step alone
      # does not catch (Apr 26 2026 incident: [streamId]/[roomCode] dynamic
      # segment collision crashed every request but built fine).
      - name: Build for tests
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL != '' && secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_MAX_VIEWERS: ${{ secrets.NEXT_PUBLIC_MAX_VIEWERS != '' && secrets.NEXT_PUBLIC_MAX_VIEWERS || '50' }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          # Server-side runtime env so /api/* don't crash on a missing
          # service-role key. The test suite never authenticates so the
          # value just needs to exist; we use a placeholder if no real
          # secret is wired up.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Build for Cloudflare (OpenNext)
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL != '' && secrets.NEXT_PUBLIC_APP_URL || 'https://v0-live-stream-app.workers.dev' }}
          NEXT_PUBLIC_MAX_VIEWERS: ${{ secrets.NEXT_PUBLIC_MAX_VIEWERS != '' && secrets.NEXT_PUBLIC_MAX_VIEWERS || '50' }}
          NODE_ENV: production

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la .open-next/
          echo "Worker: $(du -sh .open-next/worker.js 2>/dev/null || echo 'not found')"
          echo "Assets: $(du -sh .open-next/assets 2>/dev/null || echo 'not found')"

      # Hard gate on bundle size BEFORE we hit Cloudflare. Workers Paid
      # caps the worker at 10 MiB compressed; we keep a 9 MiB ceiling
      # to leave headroom and catch growth early instead of finding out
      # via a failed deploy.
      - name: Enforce worker size budget
        run: |
          BUNDLE=".open-next/server-functions/default/handler.mjs"
          if [ ! -f "$BUNDLE" ]; then
            echo "::error::Worker bundle not found at $BUNDLE"
            exit 1
          fi
          SIZE_BYTES=$(stat -c%s "$BUNDLE")
          SIZE_MB=$(awk "BEGIN { printf \"%.2f\", $SIZE_BYTES / 1024 / 1024 }")
          BUDGET_MB=9
          BUDGET_BYTES=$((BUDGET_MB * 1024 * 1024))
          echo "Handler size: ${SIZE_MB} MiB (budget: ${BUDGET_MB} MiB)"
          if [ "$SIZE_BYTES" -gt "$BUDGET_BYTES" ]; then
            echo "::error::Worker bundle ${SIZE_MB} MiB exceeds budget ${BUDGET_MB} MiB."
            echo "Cloudflare Workers Paid caps at 10 MiB. See next.config.mjs"
            echo "for the @vercel/og alias trick. Largest deps:"
            ls -laS .open-next/server-functions/default/ | head -10
            exit 1
          fi

      # ─── Sync runtime secrets to the Worker ──────────────────────
      # These are server-side secrets (never baked into the build).
      # wrangler secret put is idempotent — safe to run every deploy.
      # If a secret is not set as a GitHub Secret it will be skipped.
      - name: Sync runtime secrets to Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
            echo "✅ SUPABASE_SERVICE_ROLE_KEY synced"
          else
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY not set — skipping (add to GitHub Secrets)"
          fi
          if [ -n "$CRON_SECRET" ]; then
            echo "$CRON_SECRET" | npx wrangler secret put CRON_SECRET
            echo "✅ CRON_SECRET synced"
          else
            echo "⚠️  CRON_SECRET not set — skipping (add to GitHub Secrets)"
          fi

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --var NODE_ENV:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅  Deployed successfully to Cloudflare Workers"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📺  Live surface:   https://live.isunday.me"
          echo "🎬  Studio surface: https://studio.isunday.me"
          echo "🤖  AI Hub:         https://ai.isunday.me"
          echo "🔧  Workers dev:    https://v0-live-stream-app.workers.dev"
          echo ""
          echo "📦  Commit:  ${{ github.sha }}"
          echo "🌿  Branch:  ${{ github.ref_name }}"
          echo "👤  Author:  ${{ github.actor }}"
          echo "🕐  Time:    $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "🔑  Secrets required in GitHub → Settings → Secrets:"
          echo "    CLOUDFLARE_API_TOKEN        (Workers:Edit permission)"
          echo "    CLOUDFLARE_ACCOUNT_ID       (Cloudflare dashboard → top right)"
          echo "    NEXT_PUBLIC_SUPABASE_URL    (baked at build time)"
          echo "    NEXT_PUBLIC_SUPABASE_ANON_KEY (baked at build time)"
          echo "    SUPABASE_SERVICE_ROLE_KEY   (runtime — never public)"
          echo "    CRON_SECRET                 (runtime — random string)"
          echo "    NEXT_PUBLIC_APP_URL         (optional, defaults to workers.dev)"

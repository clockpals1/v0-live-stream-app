name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Cloudflare

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'   # wrangler 4.x requires >=20.19
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare (OpenNext)
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL != '' && secrets.NEXT_PUBLIC_APP_URL || 'https://v0-live-stream-app.workers.dev' }}
          NEXT_PUBLIC_MAX_VIEWERS: ${{ secrets.NEXT_PUBLIC_MAX_VIEWERS != '' && secrets.NEXT_PUBLIC_MAX_VIEWERS || '50' }}
          NODE_ENV: production

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la .open-next/
          echo "Worker: $(du -sh .open-next/worker.js 2>/dev/null || echo 'not found')"
          echo "Assets: $(du -sh .open-next/assets 2>/dev/null || echo 'not found')"

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --var NODE_ENV:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "✅ Deployed successfully!"
          echo "🌐 URL: https://v0-live-stream-app.workers.dev"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"

name = "v0-live-stream-app"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─── Custom domains ───────────────────────────────────────────────────
# One Worker handles all three product surfaces. The middleware at
# lib/supabase/middleware.ts reads the `host` header and routes each
# subdomain to its Next.js route group:
#
#   live.isunday.me   →  /host/*    (viewer + host streaming surface)
#   studio.isunday.me →  /studio/*  (creator workspace)
#   ai.isunday.me     →  /ai/*      (AI Automation Hub)
#
# Auth cookies use domain=.isunday.me so a single login works on all
# three subdomains (see lib/supabase/cookie-options.ts).
#
# IMPORTANT: These routes only take effect after you add the domains
# in the Cloudflare dashboard (Workers & Pages → your worker → Custom Domains)
# AND add matching CNAME/A DNS records. See the activation guide.
routes = [
  { pattern = "live.isunday.me/*", custom_domain = true },
  { pattern = "studio.isunday.me/*", custom_domain = true },
  { pattern = "ai.isunday.me/*", custom_domain = true },
]

# ─── Cron triggers ────────────────────────────────────────────────────
# Three scheduled jobs:
#
#   03:30 UTC daily  — archive/stream cleanup
#   07:00 UTC daily  — AI automation: content ideas, weekly summaries,
#                      affiliate campaigns, God-mode agent chains
#   00 * * * *       — Publishing Hub: sweep publish_queue for items
#                      where status='scheduled' AND scheduled_for <= now()
#                      and auto-publish them (YouTube server-side stream;
#                      other platforms queued for manual trigger).
#
# OpenNext routes cron events to their matching /api/cron/* route.
# You can also trigger manually:
#   GET /api/cron/archives/cleanup        Authorization: Bearer $CRON_SECRET
#   GET /api/cron/ai/daily-jobs           Authorization: Bearer $CRON_SECRET
#   GET /api/cron/publish/scheduled       Authorization: Bearer $CRON_SECRET
[triggers]
crons = ["30 3 * * *", "0 7 * * *", "0 * * * *"]
